# Disable hardware mixer volume control and allow high software volume for
# the built-in audio card.
#
# api.alsa.soft-mixer = true: pins the ALSA hardware Master at its last-set
# value (0 dB = 127/127). The slider controls only software volume, so the
# hardware doesn't drag the signal down to -41 dB at 20% slider.
#
# The PulseAudio cubic volume curve (v^3) makes 20% slider = 0.008 linear.
# Without soft-mixer, WirePlumber maps this to 44/127 on the hardware Master
# (-41.5 dB), making it inaudible. With soft-mixer, the hardware stays at 0 dB
# and only software volume attenuates — but 0.008 is still very quiet.
# The filter-chain pre-amp (in pipewire.conf.d) compensates for this.

monitor.alsa.rules = [
  {
    matches = [
      { device.name = "alsa_card.pci-0000_00_1f.3" }
    ]
    actions = {
      update-props = {
        api.alsa.soft-mixer = true
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_output.pci-0000_00_1f.3.analog-stereo" }
    ]
    actions = {
      update-props = {
        channelmix.max-volume = 10.0
      }
    }
  }
]