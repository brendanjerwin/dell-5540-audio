# Disable hardware mixer volume control and allow high software volume.
#
# api.alsa.soft-mixer = true: pins the ALSA hardware Master at its last-set
# value (0 dB = 127/127). The slider controls only software volume.
#
# Set via monitor.alsa.properties (applied at device creation, before route
# restore) AND monitor.alsa.rules (applied when device matches). This ensures
# soft-mixer is active before WirePlumber restores route volumes on boot.
#
# channelmix.max-volume = 10.0 allows the filter-chain's boosted signal through.

monitor.alsa.properties = {
  api.alsa.soft-mixer = true
}

monitor.alsa.rules = [
  {
    matches = [
      { device.name = "alsa_card.pci-0000_00_1f.3" }
    ]
    actions = {
      update-props = {
        api.alsa.soft-mixer = true
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_output.pci-0000_00_1f.3.analog-stereo" }
    ]
    actions = {
      update-props = {
        channelmix.max-volume = 10.0
      }
    }
  }
]