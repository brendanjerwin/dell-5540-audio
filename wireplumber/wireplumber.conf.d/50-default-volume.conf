# Set the default sink volume to 100% (1.0) instead of the built-in 6.4% (0.064).
# The built-in default causes the ALSA hardware Master to restore at near-zero
# attenuation on profile switches and restarts, making audio inaudible at low
# slider positions. With the hardware at unity (0 dB, 127/127), the slider's
# software volume is the only gain control — so 20% on the slider = 0.20 of
# a full-level signal, which is audible.

wireplumber.settings = {
  device.routes.default-sink-volume = 1.0
}