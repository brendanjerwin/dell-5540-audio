# Virtual sink with 4-band Dolby-like EQ + stereo widener + limiter
# for the Dell Precision 5540.
#
# This Dell Precision 5540's ALC3266 speakers have no UCM profile, so the
# generic ACP fallback applies PulseAudio's cubic volume curve (v^3),
# making 20% slider = 0.008 linear = -42 dB (inaudible).
#
# Filter chain signal flow:
#   app → [slider volume] → EQ (6 bands, per-channel) → stereo widener → limiter → hardware
#
# EQ bands (what "Dolby" laptop modes actually do — tuned EQ curves):
# 1. bq_lowshelf:  80 Hz, +5 dB  — deep bass boost for thin laptop speakers
# 2. bq_peaking:  250 Hz, +2 dB  — warmth/body
# 3. bq_peaking:   3 kHz, +1 dB  — voice/presence (dialog intelligibility)
# 4. bq_peaking:   5 kHz, +2 dB  — voice clarity (consonant articulation)
# 5. bq_highshelf: 10 kHz, +3 dB — air/clarity/sparkle
#
# Stereo widener (swh-plugins matrixSpatialiser):
#   Width = 1.5 — increases stereo separation beyond the physical speaker spacing
#
# Limiter (swh-plugins fastLookaheadLimiter):
#   +15 dB input gain (≈5.6x) to make low slider positions audible
#   -3 dB ceiling to prevent clipping/distortion at high volumes
#
# Result:
#   - 5% slider: inaudible (noise floor)
#   - 20% slider: audible (0.008 × 5.6 = 0.045, -27 dB + EQ boost)
#   - 50% slider: comfortable (0.125 × 5.6 = 0.7, -3 dB, at limiter threshold)
#   - 100% slider: loud, clean (limited to -3 dB, no crackling)
#
# Requires: swh-plugins (LADSPA fast_lookahead_limiter_1913.so, matrix_spatialiser_1422.so)

context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Built-in Audio (Enhanced)"
            media.name       = "Built-in Audio (Enhanced)"
            filter.graph = {
                nodes = [
                    # Band 1: Bass boost — deep low shelf at 80 Hz, +5 dB
                    {
                        type  = builtin
                        name  = bass_L
                        label = bq_lowshelf
                        control = { "Freq" = 80.0 "Q" = 0.7 "Gain" = 5.0 }
                    }
                    {
                        type  = builtin
                        name  = bass_R
                        label = bq_lowshelf
                        control = { "Freq" = 80.0 "Q" = 0.7 "Gain" = 5.0 }
                    }
                    # Band 2: Warmth — peaking at 250 Hz, +2 dB
                    {
                        type  = builtin
                        name  = warm_L
                        label = bq_peaking
                        control = { "Freq" = 250.0 "Q" = 1.0 "Gain" = 2.0 }
                    }
                    {
                        type  = builtin
                        name  = warm_R
                        label = bq_peaking
                        control = { "Freq" = 250.0 "Q" = 1.0 "Gain" = 2.0 }
                    }
                    # Band 3: Voice/presence boost — peaking at 3 kHz, +1 dB
                    # Speech intelligibility lives at 2-4 kHz; gentle boost
                    # helps dialog clarity in videos without harshness
                    {
                        type  = builtin
                        name  = mid_L
                        label = bq_peaking
                        control = { "Freq" = 3000.0 "Q" = 1.0 "Gain" = 1.0 }
                    }
                    {
                        type  = builtin
                        name  = mid_R
                        label = bq_peaking
                        control = { "Freq" = 3000.0 "Q" = 1.0 "Gain" = 1.0 }
                    }
                    # Band 3b: Voice clarity — peaking at 5 kHz, +2 dB
                    # Adds presence and articulation to consonants/sibilance
                    {
                        type  = builtin
                        name  = presence_L
                        label = bq_peaking
                        control = { "Freq" = 5000.0 "Q" = 1.0 "Gain" = 2.0 }
                    }
                    {
                        type  = builtin
                        name  = presence_R
                        label = bq_peaking
                        control = { "Freq" = 5000.0 "Q" = 1.0 "Gain" = 2.0 }
                    }
                    # Band 4: Air/clarity — high shelf at 10 kHz, +3 dB
                    {
                        type  = builtin
                        name  = air_L
                        label = bq_highshelf
                        control = { "Freq" = 10000.0 "Q" = 0.7 "Gain" = 3.0 }
                    }
                    {
                        type  = builtin
                        name  = air_R
                        label = bq_highshelf
                        control = { "Freq" = 10000.0 "Q" = 0.7 "Gain" = 3.0 }
                    }
                    # Stereo widener — increases stereo separation
                    {
                        type   = ladspa
                        name   = widener
                        plugin = matrix_spatialiser_1422
                        label  = matrixSpatialiser
                        control = { "Width" = 1.5 }
                    }
                    # Limiter: +15 dB gain, -3 dB ceiling
                    {
                        type   = ladspa
                        name   = limiter_L
                        plugin = fast_lookahead_limiter_1913
                        label  = fastLookaheadLimiter
                        control = { "Input gain (dB)" = 15.0 "Limit (dB)" = -3.0 "Release time (s)" = 0.1 }
                    }
                    {
                        type   = ladspa
                        name   = limiter_R
                        plugin = fast_lookahead_limiter_1913
                        label  = fastLookaheadLimiter
                        control = { "Input gain (dB)" = 15.0 "Limit (dB)" = -3.0 "Release time (s)" = 0.1 }
                    }
                ]
                # Wire: input → bass → warm → mid → air → widener → limiter → output
                links = [
                    { output = "bass_L:Out"  input = "warm_L:In" }
                    { output = "bass_R:Out"  input = "warm_R:In" }
                    { output = "warm_L:Out"  input = "mid_L:In" }
                    { output = "warm_R:Out"  input = "mid_R:In" }
                    { output = "mid_L:Out"   input = "presence_L:In" }
                    { output = "mid_R:Out"   input = "presence_R:In" }
                    { output = "presence_L:Out"  input = "air_L:In" }
                    { output = "presence_R:Out"  input = "air_R:In" }
                    { output = "air_L:Out"   input = "widener:Input L" }
                    { output = "air_R:Out"   input = "widener:Input R" }
                    { output = "widener:Output L"  input = "limiter_L:Input 1" }
                    { output = "widener:Output R"  input = "limiter_R:Input 1" }
                ]
                inputs  = [ "bass_L:In" "bass_R:In" ]
                outputs = [ "limiter_L:Output 1" "limiter_R:Output 1" ]
            }
            audio.channels = 2
            audio.position = [ FL FR ]
            capture.props = {
                node.name   = "boosted_input.built_in"
                media.class = Audio/Sink
            }
            playback.props = {
                node.name   = "boosted_output.built_in"
                node.passive = true
                target.object = "alsa_output.pci-0000_00_1f.3.analog-stereo"
                stream.dont-remix = true
            }
        }
    }
]